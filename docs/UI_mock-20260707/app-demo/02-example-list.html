<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>列表页示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; width: 375px; min-height: 812px; background: #f5f5f5; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; position: relative; }
.nav-bar .back { position: absolute; left: 12px; font-size: 20px; color: #333; }
.nav-bar .title { font-size: 17px; font-weight: 600; color: #333; }
.list-container { padding: 12px; }
.record-item { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.record-left { display: flex; flex-direction: column; gap: 4px; }
.record-time { font-size: 13px; color: #333; }
.record-type { font-size: 12px; color: #909399; }
.record-status { font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
.status-processing { background: #ecf5ff; color: #2979ff; }
.status-success { background: #f0f9eb; color: #67c23a; }
.status-rejected { background: #fef0f0; color: #f56c6c; }
.status-closed { background: #f4f4f5; color: #909399; }
</style>
</head>
<body>
<div class="nav-bar"><span class="back">&lsaquo;</span><span class="title">售后记录</span></div>
<div class="list-container">
  <div class="record-item"><div class="record-left"><span class="record-time">2026-06-22 11:30</span><span class="record-type">仅退款</span></div><span class="record-status status-processing">处理中</span></div>
  <div class="record-item"><div class="record-left"><span class="record-time">2026-06-20 09:15</span><span class="record-type">退货退款</span></div><span class="record-status status-success">退款成功</span></div>
  <div class="record-item"><div class="record-left"><span class="record-time">2026-06-18 16:40</span><span class="record-type">换货</span></div><span class="record-status status-success">换货完成</span></div>
  <div class="record-item"><div class="record-left"><span class="record-time">2026-06-15 14:20</span><span class="record-type">仅退款</span></div><span class="record-status status-rejected">已拒绝</span></div>
  <div class="record-item"><div class="record-left"><span class="record-time">2026-06-10 08:50</span><span class="record-type">仅退款</span></div><span class="record-status status-closed">已关闭</span></div>
</div>
</body>
</html>
