<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>表单页示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; width: 375px; min-height: 812px; background: #f5f5f5; padding-bottom: 80px; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; position: relative; }
.nav-bar .back { position: absolute; left: 12px; font-size: 20px; color: #333; }
.nav-bar .title { font-size: 17px; font-weight: 600; color: #333; }
.card { background: #fff; border-radius: 12px; margin: 12px 16px 0; padding: 16px; }
.card-title { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 12px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: #999; margin-bottom: 6px; }
.form-input { width: 100%; height: 40px; border: 1px solid #ebeef5; border-radius: 8px; padding: 0 12px; font-size: 14px; color: #333; display: flex; align-items: center; background: #fafafa; }
.form-textarea { width: 100%; min-height: 80px; border: 1px solid #ebeef5; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #c0c4cc; background: #fafafa; line-height: 1.5; }
.bottom-bar { position: fixed; bottom: 0; left: 0; width: 375px; background: #fff; border-top: 1px solid #eee; padding: 10px 16px; }
.btn-submit { width: 100%; height: 44px; border-radius: 22px; border: none; background: #2979ff; color: #fff; font-size: 15px; font-weight: 500; }
</style>
</head>
<body>
<div class="nav-bar"><span class="back">&lsaquo;</span><span class="title">预约上门取件</span></div>
<div class="card">
  <div class="card-title">取件地址</div>
  <div class="form-group"><div class="form-label">联系人</div><div class="form-input">李明</div></div>
  <div class="form-group"><div class="form-label">手机号</div><div class="form-input">13812345678</div></div>
  <div class="form-group"><div class="form-label">详细地址</div><div class="form-input">云南省弥勒市温泉路168号</div></div>
</div>
<div class="card">
  <div class="card-title">预约取件时间</div>
  <div class="form-input" style="justify-content:space-between;"><span>2026-06-24 09:00-12:00</span><span style="color:#c0c4cc;">▼</span></div>
</div>
<div class="card">
  <div class="card-title">备注</div>
  <div class="form-textarea">请输入备注信息...</div>
</div>
<div class="bottom-bar"><button class="btn-submit">提交预约</button></div>
</body>
</html>
