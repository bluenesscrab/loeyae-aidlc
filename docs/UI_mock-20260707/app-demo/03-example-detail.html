<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>详情页示例（组件库模式）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; width: 375px; min-height: 812px; background: #f9faf6; padding-bottom: 70px; }
.block-label { display: inline-block; background: #2979ff; color: #fff; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; margin: 8px 16px 4px; }
.block-desc { font-size: 10px; color: #999; margin-left: 4px; }
.content-card { background: #fff; margin: 4px 16px; border-radius: 12px; padding: 14px 16px; }
.info-row { padding: 8px 0; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #f5f5f5; }
.info-row:last-child { border-bottom: none; }
.info-label { color: #999; font-size: 13px; white-space: nowrap; min-width: 35%; }
.info-value { color: #333; font-size: 13px; text-align: right; flex: 1; }
</style>
</head>
<body>

<span class="block-label">A 导航栏</span>
<div style="height:44px; background:#fff; display:flex; align-items:center; position:relative; padding:0 16px; border-bottom:1px solid #f0f0f0;">
  <span style="font-size:20px; color:#333;">&lsaquo;</span>
  <span style="position:absolute; left:50%; transform:translateX(-50%); font-size:17px; font-weight:600; color:#262626;">售后详情</span>
</div>

<span class="block-label">B 头部状态区</span>
<span class="block-desc">展示所有可能元素的最大集</span>
<div class="content-card" style="text-align:center; padding:30px 16px 20px;">
  <div style="font-size:26px; font-weight:bold; color:#ff9900;">68.00</div>
  <div style="font-size:14px; color:#999; margin-top:8px;">商家审核中</div>
  <div style="font-size:13px; color:#666; margin-top:6px; padding:0 32px;">拒绝原因：商品已使用</div>
</div>

<span class="block-label">E 售后商品</span>
<div class="content-card">
  <div style="font-size:13px; color:#666; margin-bottom:8px;">售后商品</div>
  <div style="display:flex; gap:10px; padding:10px 0; align-items:flex-start;">
    <div style="width:60px; height:60px; background:#e9ecef; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center;"><span style="font-size:10px; color:#999;">图片</span></div>
    <div style="flex:1;">
      <div style="font-size:14px; color:#333; font-weight:500;">招牌酸菜鱼（大份）</div>
      <div style="font-size:11px; color:#999; margin-top:2px;">×1</div>
    </div>
    <div style="font-size:14px; color:#f56c6c; font-weight:500;">¥68.00</div>
  </div>
</div>

<span class="block-label">F 申请信息</span>
<div class="content-card">
  <div class="info-row"><span class="info-label">期望退款金额</span><span class="info-value">¥68.00</span></div>
  <div class="info-row"><span class="info-label">退款原因</span><span class="info-value">商品与描述不符</span></div>
  <div style="padding:10px 0 0;">
    <div style="font-size:13px; color:#999; margin-bottom:8px;">退款凭证</div>
    <div style="display:flex; gap:8px;">
      <div style="width:72px; height:72px; border-radius:6px; background:linear-gradient(135deg,#e9ecef,#dee2e6);"></div>
      <div style="width:72px; height:72px; border-radius:6px; background:linear-gradient(135deg,#e9ecef,#dee2e6);"></div>
    </div>
  </div>
</div>

<span class="block-label">C 信息列表</span>
<div class="content-card">
  <div class="info-row"><span class="info-label">售后单号</span><span class="info-value">AS20260622113000001</span></div>
  <div class="info-row"><span class="info-label">售后方式</span><span class="info-value">仅退款</span></div>
  <div class="info-row"><span class="info-label">退款金额</span><span class="info-value">¥68.00</span></div>
  <div class="info-row"><span class="info-label">退款发起方</span><span class="info-value">用户申请</span></div>
  <div class="info-row"><span class="info-label">审核时间</span><span class="info-value">2026-06-22 13:05</span></div>
</div>

<span class="block-label">H 底部操作栏</span>
<div style="background:#fff; border-top:1px solid #eee; padding:10px 16px; display:flex; gap:8px;">
  <button style="flex:1; height:40px; border-radius:20px; border:1px solid #2979ff; background:#fff; color:#2979ff; font-size:14px;">取消售后</button>
  <button style="flex:1; height:40px; border-radius:20px; border:none; background:#2979ff; color:#fff; font-size:14px; font-weight:500;">申请平台介入</button>
  <button style="flex:1; height:40px; border-radius:20px; border:1px solid #909399; background:#fff; color:#909399; font-size:14px;">关闭售后</button>
</div>

</body>
</html>
